<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section Class="conteudo">
        <div Class="conteudo-titulo">
          <ing src="unlock.svg" alt="Cadeado de seguranca"
          <h2 class="titulo-principal">Gerador de Senha</h2>
          <h3 class="titula-secundario">Gere instantaneamente uma senha aleatória e segura</h3>
        </div>
        <div class="conteudo-senha">
            <label for="Senha">Senha</label>
            <input name="senha" type = "text" id="campo-senha">
        </div>
        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button class="parametro-senha__botao">-</button>
                        <p class="parametro-senha__texto">12</p>
                        <button class="parametro-senha__botao">+</button>
                    </div>
                </div>               
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Características da senha</h4>
                    <input type="checkbox" name="maiúsculo">
                    <label for="maiúsculo">Letras Maiúsculas</label>
                    <input type="checkbox" name="minúsculo">
                    <label for="maiúsculo">Letras Minúsculas</label>
                    <input type="checkbox" name="minúsculo">
                    <label for="maiúsculo">Letras Minúsculas</label>
                    <input type="checkbox" name="minúsculo">
                    <label for="maiúsculo">Letras Minúsculas</label>
                </div>
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Força da senha</h4>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
